services:
  silk-converter:
    build: .
    image: "${IMAGE:-ghcr.io/zwscy/silkbridge:latest}"
    container_name: silk-converter
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
